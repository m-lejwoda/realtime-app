<!DOCTYPE html>
<html lang="pl">
  <head>
    <title>RealTime Chat App</title>
  </head>
  <body>
    <p>RealTime Chat App</p>
    <button id="connect">Connect to room</button>
    <input type="text" name="message" id="message"></input>
    <button id="sendMessage">Send Message</button>
    <div id="chat">sdfdfssdfsdf</div>
  </body>
  <script>
    console.log("working")
    let websocket = null
    const connectButton = document.getElementById("connect")
    const sendMessageButton = document.getElementById("sendMessage")
    function connectToTheRoom(e){
        console.log("connectToTheRoom", e)
        if (websocket == null) {
            console.log("Add connection")
            websocket = new WebSocket("ws://localhost:8080/ws")
            websocket.addEventListener("message", getMessage)
        }else{
            console.log("Connection already")
        }
    }
    function sendMessage(e){
        message = document.getElementById("message").value
        console.log("message", message)
        websocket.send(message)
    }
    function getMessage(msg){
        console.log("getMEssage", msg)
        console.log(JSON.parse(msg.data))
        const newMsg = JSON.parse(msg.data)
        const newChild = document.createElement('div')
        const date = new Date(newMsg.Date)
        console.log("date", date)
        const resDate = date.toLocaleTimeString();
        console.log("resDate", resDate)
        newChild.id = 'new_content'
        newChild.className = 'message'
        newChild.innerHTML = `<div>${resDate}</div><div>${newMsg.User}</div><div className="content"><p>${newMsg.Content}</p></div><div>Options</div>`
        document.getElementById("chat").appendChild(newChild)
    }
    connectButton.addEventListener("click", connectToTheRoom)
    sendMessageButton.addEventListener("click", sendMessage)
    
   
</script>
</html>
